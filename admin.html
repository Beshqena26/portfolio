<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review moderation — private</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27><circle cx=%2750%27 cy=%2750%27 r=%2746%27 fill=%27%23ff6b35%27/><text x=%2750%27 y=%2768%27 font-size=%2752%27 font-family=%27Arial%27 font-weight=%27bold%27 fill=%27white%27 text-anchor=%27middle%27>B</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#0a0a0a;color:#eee;padding:32px 18px;line-height:1.5}
.wrap{max-width:720px;margin:0 auto}
h1{font-family:'Space Grotesk',sans-serif;font-size:24px;margin-bottom:4px}
.sub{color:#8a8a8a;font-size:13px;margin-bottom:24px}
.gate{display:flex;gap:10px;margin-bottom:28px}
input{flex:1;padding:12px 15px;border-radius:12px;background:#141414;border:1px solid #222;color:#eee;font-family:inherit;font-size:14px}
input:focus{outline:none;border-color:#ff6b35}
button{font-family:inherit;font-weight:600;font-size:13px;padding:12px 18px;border-radius:12px;border:none;cursor:pointer;transition:.2s}
.btn-p{background:#ff6b35;color:#fff}.btn-p:hover{background:#e8530f}
.btn-g{background:#141414;color:#eee;border:1px solid #222}.btn-g:hover{border-color:#ff6b35}
h2{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#8a8a8a;margin:24px 0 12px}
.card{background:#141414;border:1px solid #222;border-radius:14px;padding:18px;margin-bottom:12px}
.card .stars{color:#fbbf24;letter-spacing:2px;font-size:14px}
.card p{font-size:14px;color:#ddd;font-style:italic;margin:8px 0}
.card .who{font-size:13px;color:#8a8a8a}
.card .who b{color:#eee}
.acts{display:flex;gap:8px;margin-top:14px}
.acts button{padding:8px 16px}
.approve{background:rgba(52,211,153,.12);color:#34d399;border:1px solid rgba(52,211,153,.3)}
.reject,.delete{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.empty{color:#6a6a6a;font-size:14px;padding:16px 0}
.msg{font-size:13px;min-height:18px;margin:8px 0;color:#8a8a8a}
</style>
</head>
<body>
<div class="wrap">
  <h1>Review moderation</h1>
  <p class="sub">Private page — approve or reject visitor reviews before they go live.</p>
  <div class="gate">
    <input type="password" id="key" placeholder="Admin key" autocomplete="off">
    <button class="btn-p" id="load">Load</button>
  </div>
  <p class="msg" id="msg"></p>
  <div id="panel" style="display:none">
    <h2>Pending <span id="pcount"></span></h2>
    <div id="pending"></div>
    <h2>Live on site <span id="acount"></span></h2>
    <div id="approved"></div>
  </div>
</div>
<script>
var key='', msg=document.getElementById('msg');
function esc(s){var d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML;}
function stars(n){var o='';for(var i=0;i<5;i++)o+=(i<n?'★':'☆');return o;}
function card(r,kind){
  return '<div class="card"><div class="stars">'+stars(r.rating)+'</div>'+
    '<p>"'+esc(r.message)+'"</p><div class="who"><b>'+esc(r.name)+'</b>'+(r.role?' · '+esc(r.role):'')+'</div>'+
    '<div class="acts">'+(kind==='pending'
      ? '<button class="approve" data-a="approve" data-at="'+r.at+'">✓ Approve</button><button class="reject" data-a="reject" data-at="'+r.at+'">✕ Reject</button>'
      : '<button class="delete" data-a="delete" data-at="'+r.at+'">Remove from site</button>')+'</div></div>';
}
function render(d){
  document.getElementById('panel').style.display='block';
  var p=d.pending||[], a=d.approved||[];
  document.getElementById('pcount').textContent='('+p.length+')';
  document.getElementById('acount').textContent='('+a.length+')';
  document.getElementById('pending').innerHTML=p.length?p.map(function(r){return card(r,'pending')}).join(''):'<div class="empty">Nothing pending.</div>';
  document.getElementById('approved').innerHTML=a.length?a.map(function(r){return card(r,'live')}).join(''):'<div class="empty">No live reviews yet.</div>';
  bind();
}
function load(){
  key=document.getElementById('key').value.trim();
  if(!key){msg.textContent='Enter the admin key.';return;}
  msg.textContent='Loading…';
  fetch('/api/reviews?admin=1&t='+Date.now(),{headers:{'x-admin-key':key},cache:'no-store'})
    .then(function(r){if(r.status===401)throw new Error('Wrong key.');return r.json();})
    .then(function(d){msg.textContent='';render(d);})
    .catch(function(e){msg.textContent=e.message||'Error.';document.getElementById('panel').style.display='none';});
}
function act(a,at){
  msg.textContent='Working…';
  fetch('/api/reviews',{method:'POST',headers:{'Content-Type':'application/json','x-admin-key':key},cache:'no-store',body:JSON.stringify({action:a,at:at})})
    .then(function(r){if(!r.ok)throw new Error('Failed.');return r.json();})
    .then(function(){msg.textContent = a==='approve'?'Approved — now live on the site.':(a==='reject'?'Rejected.':'Removed.'); setTimeout(load, 700);})
    .catch(function(e){msg.textContent=e.message||'Error.';});
}
function bind(){
  document.querySelectorAll('.acts button').forEach(function(b){
    b.onclick=function(){act(b.getAttribute('data-a'),Number(b.getAttribute('data-at')));};
  });
}
document.getElementById('load').onclick=load;
document.getElementById('key').addEventListener('keydown',function(e){if(e.key==='Enter')load();});
</script>
</body>
</html>
